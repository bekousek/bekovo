<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 250" role="img" aria-label="Schéma obvodu: ampérmetr v sérii, voltmetr paralelně k rezistoru">
  <g fill="none" stroke="#1f2937" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- horní vodič s rezistorem -->
    <line x1="55" y1="80" x2="135" y2="80"/>
    <line x1="185" y1="80" x2="265" y2="80"/>
    <rect x="135" y="68" width="50" height="24" rx="3" fill="#ffffff"/>
    <!-- pravý vodič -->
    <line x1="265" y1="80" x2="265" y2="215"/>
    <!-- dolní vodič s ampérmetrem -->
    <line x1="265" y1="215" x2="177" y2="215"/>
    <line x1="143" y1="215" x2="55" y2="215"/>
    <!-- levý vodič s baterií -->
    <line x1="55" y1="215" x2="55" y2="140"/>
    <line x1="55" y1="128" x2="55" y2="80"/>
    <line x1="40" y1="128" x2="70" y2="128"/>
    <line x1="48" y1="140" x2="62" y2="140" stroke-width="5"/>
    <!-- vývody voltmetru -->
    <line x1="135" y1="80" x2="135" y2="40"/>
    <line x1="185" y1="80" x2="185" y2="40"/>
    <line x1="135" y1="40" x2="143" y2="40"/>
    <line x1="177" y1="40" x2="185" y2="40"/>
    <!-- měřicí přístroje -->
    <circle cx="160" cy="215" r="17" fill="#ffffff"/>
    <circle cx="160" cy="40" r="17" fill="#ffffff"/>
  </g>
  <g font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="middle">
    <text x="160" y="222" font-size="20" font-weight="700" fill="#1e40af">A</text>
    <text x="160" y="47" font-size="20" font-weight="700" fill="#1e40af">V</text>
    <text x="80" y="121" font-size="16" fill="#6b7280">+</text>
    <text x="205" y="86" font-size="16" font-weight="700" fill="#6b7280">R</text>
  </g>
</svg>
