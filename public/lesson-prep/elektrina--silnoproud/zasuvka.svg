<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 250" role="img" aria-label="Zásuvka: fázový a nulový vodič a ochranný kolík, s barvami vodičů">
  <text x="160" y="22" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">ochranný kolík</text>
  <circle cx="160" cy="96" r="76" fill="#f3f4f6" stroke="#9ca3af" stroke-width="2.5"/>
  <circle cx="160" cy="96" r="58" fill="#e5e7eb" stroke="#d1d5db" stroke-width="2"/>
  <rect x="153" y="44" width="14" height="26" rx="3" fill="#6b7280"/>
  <circle cx="134" cy="104" r="10" fill="#374151"/>
  <circle cx="186" cy="104" r="10" fill="#374151"/>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#374151">
    <rect x="34" y="184" width="15" height="15" rx="2" fill="#92400e"/>
    <text x="58" y="196">fázový vodič (hnědá / černá / šedá)</text>
    <rect x="34" y="208" width="15" height="15" rx="2" fill="#2563eb"/>
    <text x="58" y="220">nulový vodič – „nulák" (modrá)</text>
    <rect x="34" y="232" width="15" height="15" rx="2" fill="#16a34a"/>
    <text x="58" y="244">ochranný vodič – kolík (zelenožlutá)</text>
  </g>
</svg>
