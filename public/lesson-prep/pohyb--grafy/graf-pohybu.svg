<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 180" font-family="ui-sans-serif, system-ui, sans-serif" role="img" aria-label="Graf dráhy v čase: rovnoměrný pohyb je rostoucí přímka, klid vodorovná čára">
  <g stroke="#9ca3af" stroke-width="1.5" fill="none">
    <line x1="44" y1="150" x2="270" y2="150"/>
    <line x1="44" y1="20" x2="44" y2="150"/>
  </g>
  <line x1="44" y1="150" x2="214" y2="44" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
  <line x1="44" y1="104" x2="214" y2="104" stroke="#16a34a" stroke-width="3" stroke-dasharray="6 5" stroke-linecap="round"/>
  <text x="222" y="48" font-size="11" font-weight="700" fill="#2563eb">rovnoměrný pohyb</text>
  <text x="222" y="108" font-size="11" font-weight="700" fill="#16a34a">klid</text>
  <text x="34" y="26" font-size="13" font-weight="700" fill="#374151" text-anchor="end">s</text>
  <text x="266" y="168" font-size="13" font-weight="700" fill="#374151" text-anchor="end">t</text>
</svg>
