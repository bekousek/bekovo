<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 200" role="img" aria-label="Graf ohřevu: během tání teplota stojí na teplotě tání, i když dodáváme teplo">
  <g stroke="#9ca3af" stroke-width="1.5" fill="none">
    <line x1="40" y1="160" x2="322" y2="160"/>
    <line x1="40" y1="20" x2="40" y2="160"/>
  </g>
  <polyline points="40,140 110,92 190,92 300,42" fill="none" stroke="#dc2626" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="40" y1="92" x2="110" y2="92" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="4 4"/>
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <text x="34" y="96" font-size="12" font-weight="700" fill="#1e40af" text-anchor="end">t<tspan baseline-shift="sub" font-size="9">t</tspan></text>
    <text x="30" y="26" font-size="13" font-weight="700" fill="#374151" text-anchor="end">t</text>
    <text x="318" y="178" font-size="13" font-weight="700" fill="#374151" text-anchor="end">čas</text>
    <text x="150" y="84" font-size="11" fill="#6b7280" text-anchor="middle">tání (led i voda)</text>
  </g>
</svg>
